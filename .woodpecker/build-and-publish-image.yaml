variables:
  - &buildx_plugin "docker.io/woodpeckerci/plugin-docker-buildx:6"
  - &python_image "ghcr.io/astral-sh/uv:python3.12-trixie-slim"
  - &scraper_image "sejaeger/pazufa-scraper-be"
  - &platforms
    - linux/amd64
    - linux/aarch64
  - &logins
    - registry: https://index.docker.io/v1/
      username: sejaeger
      password:
        from_secret: docker-hub-pass

when:
  - event: tag
  - event: [push, pull_request]
    branch: ${CI_REPO_DEFAULT_BRANCH}

labels:
  pazufa_scope: generic

steps:
  check_tag:
    image: *python_image
    when:
      - event: tag
    commands:
      - TAG_VERSION="${CI_COMMIT_TAG#v}"
      - PACKAGE_VERSION=$(uv version --short)
      - |
        if [ "$TAG_VERSION" != "$PACKAGE_VERSION" ]; then
          echo "ERROR: tag '$TAG_VERSION' does not match project version in pyproject.toml '$PACKAGE_VERSION'" >&2
          exit 1
        fi

  publish_tag:
    image: *buildx_plugin
    when:
      - event: tag
    depends_on:
      - check_tag
    settings:
      repo: *scraper_image
      tags:
        - latest
        - ${CI_COMMIT_TAG%%.*}
        - ${CI_COMMIT_TAG%.*}
        - ${CI_COMMIT_TAG}
      platforms: *platforms
      logins: *logins

  publish_push:
    image: *buildx_plugin
    when:
      - event: push
    settings:
      repo: *scraper_image
      tags:
        - latest
        - ${CI_COMMIT_SHA:0:7}
      platforms: *platforms
      logins: *logins

  dry_run:
    image: *buildx_plugin
    when:
      - event: pull_request
    settings:
      repo: *scraper_image
      platforms: *platforms
      dry_run: true
